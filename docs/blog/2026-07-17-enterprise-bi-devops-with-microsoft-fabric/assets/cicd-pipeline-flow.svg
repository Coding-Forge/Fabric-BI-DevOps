<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">BI DevOps CI/CD pipeline flow</title>
  <desc id="desc">A CI/CD flow showing validation, quality rules, DAX tests, artifact publication, and Fabric workspace deployment.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ef; }
      .box { fill: #ffffff; stroke: #dedede; stroke-width: 2; }
      .box2 { fill: #f8e8ee; stroke: #b11f4b; stroke-width: 2; }
      .text { fill: #242424; font-family: Segoe UI, Arial, sans-serif; }
      .muted { fill: #5c5c5c; font-family: Segoe UI, Arial, sans-serif; }
      .title { font-size: 32px; font-weight: 700; }
      .label { font-size: 19px; font-weight: 700; }
      .small { font-size: 14px; }
      .arrow { stroke: #5c5c5c; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#5c5c5c"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="420"/>
  <text class="text title" x="55" y="60">CI/CD Quality Flow</text>
  <text class="muted small" x="55" y="88">The same pattern can run on Azure DevOps, GitHub Actions, or GitLab CI/CD.</text>

  <g transform="translate(45 145)">
    <rect class="box" width="160" height="115" rx="16"/>
    <text class="text label" x="33" y="45">Validate</text>
    <text class="muted small" x="24" y="75">PBIP structure</text>
  </g>
  <path class="arrow" d="M215 202 H265"/>
  <g transform="translate(275 145)">
    <rect class="box2" width="170" height="115" rx="16"/>
    <text class="text label" x="31" y="45">Quality</text>
    <text class="muted small" x="22" y="75">Report + dataset rules</text>
  </g>
  <path class="arrow" d="M455 202 H505"/>
  <g transform="translate(515 145)">
    <rect class="box" width="160" height="115" rx="16"/>
    <text class="text label" x="45" y="45">Test</text>
    <text class="muted small" x="39" y="75">DAX metadata</text>
  </g>
  <path class="arrow" d="M685 202 H735"/>
  <g transform="translate(745 145)">
    <rect class="box" width="170" height="115" rx="16"/>
    <text class="text label" x="44" y="45">Publish</text>
    <text class="muted small" x="35" y="75">Validated artifact</text>
  </g>
  <path class="arrow" d="M925 202 H975"/>
  <g transform="translate(985 145)">
    <rect class="box2" width="170" height="115" rx="16"/>
    <text class="text label" x="45" y="45">Deploy</text>
    <text class="muted small" x="25" y="75">Dev or feature workspace</text>
  </g>

  <text class="muted small" x="55" y="335">Branch-aware enforcement keeps feature branches flexible while making protected branches stricter.</text>
</svg>
