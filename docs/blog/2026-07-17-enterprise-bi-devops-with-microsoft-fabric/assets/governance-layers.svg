<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Governance layers for enterprise BI DevOps</title>
  <desc id="desc">Layered governance model with enterprise baseline rules, profiles, project exceptions, and effective CI rules.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ef; }
      .layer1 { fill: #f8e8ee; stroke: #b11f4b; stroke-width: 2; }
      .layer2 { fill: #e7f3ff; stroke: #0078d4; stroke-width: 2; }
      .layer3 { fill: #fff5df; stroke: #f59e0b; stroke-width: 2; }
      .layer4 { fill: #e9f8ef; stroke: #16a34a; stroke-width: 2; }
      .text { fill: #242424; font-family: Segoe UI, Arial, sans-serif; }
      .muted { fill: #5c5c5c; font-family: Segoe UI, Arial, sans-serif; }
      .title { font-size: 34px; font-weight: 700; }
      .label { font-size: 23px; font-weight: 700; }
      .small { font-size: 16px; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="560"/>
  <text class="text title" x="60" y="62">Enterprise Rule Governance Model</text>
  <text class="muted small" x="60" y="92">A future maturity pattern for setting rules once while allowing controlled exceptions.</text>

  <rect class="layer1" x="160" y="135" width="880" height="78" rx="18"/>
  <text class="text label" x="220" y="182">Enterprise baseline rules</text>
  <text class="muted small" x="600" y="182">Owned by BI platform or governance team</text>

  <rect class="layer2" x="210" y="235" width="780" height="78" rx="18"/>
  <text class="text label" x="270" y="282">Policy profiles</text>
  <text class="muted small" x="600" y="282">Advisory, standard, strict</text>

  <rect class="layer3" x="260" y="335" width="680" height="78" rx="18"/>
  <text class="text label" x="320" y="382">Project exceptions</text>
  <text class="muted small" x="600" y="382">Owner, reason, expiration, approval</text>

  <rect class="layer4" x="310" y="435" width="580" height="78" rx="18"/>
  <text class="text label" x="370" y="482">Effective CI rules</text>
  <text class="muted small" x="600" y="482">Generated and used by pipelines</text>
</svg>
